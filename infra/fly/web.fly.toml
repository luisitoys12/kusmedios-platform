app = "kusmedios-web"
primary_region = "mia"

[build]
  dockerfile = "../../apps/web/Dockerfile"

[env]
  PORT = "3000"
  NEXT_PUBLIC_API_URL = "https://kusmedios-api.fly.dev"
  NEXT_PUBLIC_APP_NAME = "EstacionKusMedios"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
