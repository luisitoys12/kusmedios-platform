version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kusmedios_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kusmedios
      POSTGRES_USER: kusmedios
      POSTGRES_PASSWORD: kusmedios_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kusmedios']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kusmedios_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  nginx-rtmp:
    image: tiangolo/nginx-rtmp
    container_name: kusmedios_rtmp
    restart: unless-stopped
    ports:
      - '1935:1935'
      - '8080:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - hls_data:/tmp/hls
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: kusmedios_api
    restart: unless-stopped
    ports:
      - '4000:4000'
      - '4001:4001'
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4000/api/v1/health || exit 1']
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  hls_data:
